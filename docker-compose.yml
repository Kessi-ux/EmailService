services:
  app:
    build: .
    container_name: email-service-app
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

  postgres:
    image: postgres:16
    container_name: email-service-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_service_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: email-service-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data: